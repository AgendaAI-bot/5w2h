<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planejador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--surface-2:#F0EEE9;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
  --text:#1C1B18;--text-2:#6B6A65;--text-3:#A5A49F;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-txt:#3C3489;
  --green:#0B6E4F;--green-bg:#E2F4ED;--green-txt:#085040;
  --red:#D94040;--red-bg:#FDEAEA;
  --amber:#B07010;--amber-bg:#FEF3DC;
  --done:#1D9E75;--r:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
.page{display:none;min-height:100vh;}
.page.active{display:flex;}

/* LOGIN */
#page-login{align-items:center;justify-content:center;background:var(--bg);flex-direction:column;}
.login-card{background:var(--surface);border:1px solid var(--border-md);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-dots{display:flex;}
.logo-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--surface);}
.ld1{background:var(--purple);}.ld2{background:var(--green);margin-left:-4px;}
.login-title{font-size:18px;font-weight:600;letter-spacing:-0.4px;}
.login-sub{font-size:12px;color:var(--text-3);margin-top:1px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:11px;font-weight:500;color:var(--text-2);}
.field input,.field select,.field textarea{padding:9px 12px;border-radius:var(--r);border:1px solid var(--border-md);font-size:13px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:border-color 0.15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--purple);}
.field textarea{min-height:70px;resize:vertical;}
.btn-primary{width:100%;padding:10px;background:var(--text);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;margin-top:6px;transition:background 0.15s;}
.btn-primary:hover{background:#333;}
.btn-primary:disabled{background:var(--text-3);cursor:not-allowed;}
.login-error{font-size:12px;color:var(--red);background:var(--red-bg);border-radius:var(--r);padding:8px 12px;margin-top:10px;display:none;}
.login-footer{font-size:11px;color:var(--text-3);text-align:center;margin-top:28px;}

/* APP */
#page-app{flex-direction:column;}
#prog-bar{height:3px;background:var(--border);}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--green));width:0%;transition:width 0.5s;}

header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:11px 24px;gap:16px;flex-wrap:wrap;}
.h-brand{display:flex;align-items:center;gap:8px;}
.h-dots{display:flex;}
.h-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--surface);}
.hd1{background:var(--purple);}.hd2{background:var(--green);margin-left:-3px;}
.h-name{font-size:14px;font-weight:600;letter-spacing:-0.3px;}
.h-sub{font-size:10px;color:var(--text-3);}
.h-center{display:flex;align-items:center;gap:8px;}
.week-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--text-2);font-size:16px;display:flex;align-items:center;justify-content:center;}
.week-btn:hover{background:var(--bg);}
.week-label{font-size:13px;font-weight:500;min-width:185px;text-align:center;letter-spacing:-0.2px;}
.h-right{display:flex;align-items:center;gap:8px;}
.chip{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px;border:1px solid var(--border-md);color:var(--text-2);background:var(--bg);white-space:nowrap;}
.chip.ok{background:var(--green-bg);color:var(--green-txt);border-color:transparent;}
.role-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.05em;}
.role-superadmin{background:#1C1B18;color:#fff;}
.role-admin{background:var(--purple-bg);color:var(--purple-txt);}
.role-gestor{background:var(--amber-bg);color:var(--amber);}
.role-colaborador{background:var(--green-bg);color:var(--green-txt);}
.user-btn{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 4px;border:1px solid var(--border-md);border-radius:999px;background:transparent;cursor:pointer;}
.user-btn:hover{background:var(--bg);}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;background:var(--purple);flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--text);}
.logout-btn{font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:var(--r);font-family:'Inter',sans-serif;}
.logout-btn:hover{color:var(--red);background:var(--red-bg);}

/* NOTIF BELL */
.notif-btn{position:relative;width:30px;height:30px;border-radius:var(--r);border:1px solid var(--border-md);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.notif-btn:hover{background:var(--bg);}
.notif-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--surface);display:none;}
.notif-dot.show{display:block;}

/* EMPRESA BAR */
.empresa-bar{padding:8px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.emp-filter{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;border:1px solid var(--border-md);background:transparent;font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
.emp-filter:hover{background:var(--bg);}
.emp-filter.active{color:var(--text);border-color:var(--text);}
.emp-filter.todas.active{background:var(--text);color:#fff;border-color:var(--text);}
.emp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.emp-add-btn{margin-left:auto;font-size:11px;color:var(--text-3);background:none;border:1px dashed var(--border-md);border-radius:999px;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
.emp-add-btn:hover{color:var(--text-2);border-color:var(--border-md);}

/* NAV */
.nav-tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface);}
.nav-tab{font-size:12px;font-weight:500;color:var(--text-3);padding:9px 14px;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;transition:color 0.15s;}
.nav-tab:hover{color:var(--text-2);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--purple);}

main{padding:20px 24px 40px;max-width:1280px;margin:0 auto;width:100%;}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
.col{display:flex;flex-direction:column;gap:6px;}
.day-hdr{padding:8px 10px 7px;border-radius:var(--r);text-align:center;margin-bottom:2px;border:1px solid transparent;}
.day-hdr.is-today{background:var(--green-bg);border-color:rgba(11,110,79,0.15);}
.day-hdr.normal{background:var(--surface);border-color:var(--border);}
.day-name{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;}
.day-hdr.is-today .day-name{color:var(--green-txt);}
.day-hdr.normal .day-name{color:var(--text-3);}
.day-date{font-size:20px;font-weight:600;letter-spacing:-0.5px;line-height:1.1;margin-top:2px;}
.day-hdr.is-today .day-date{color:var(--green);}
.day-hdr.normal .day-date{color:var(--text);}
.task{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 9px;display:flex;align-items:flex-start;gap:7px;cursor:pointer;position:relative;transition:border-color 0.12s,opacity 0.15s;}
.task:hover{border-color:var(--border-md);}
.task.is-done{opacity:0.4;}
.task.is-late{border-left:2.5px solid var(--red);border-radius:0 var(--r) var(--r) 0;}
.chk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border-md);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.chk.on{background:var(--done);border-color:var(--done);}
.chk.on::after{content:'';width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block;}
.chk.late{background:var(--red-bg);border-color:var(--red);}
.task-body{flex:1;min-width:0;}
.task-text{font-size:12px;color:var(--text);line-height:1.4;word-break:break-word;}
.task-text.done-txt{text-decoration:line-through;color:var(--text-3);}
.task-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:1px 6px;border-radius:999px;}
.badge-late{background:var(--red-bg);color:var(--red);}
.badge-projeto{background:var(--amber-bg);color:var(--amber);}
.del{opacity:0;border:none;background:none;cursor:pointer;color:var(--text-3);font-size:14px;padding:0 2px;flex-shrink:0;transition:opacity 0.1s,color 0.1s;}
.task:hover .del{opacity:1;}
.del:hover{color:var(--red);}
.add-form{background:var(--surface-2);border:1px dashed var(--border-md);border-radius:var(--r);padding:8px 9px;display:flex;flex-direction:column;gap:6px;}
.add-inp{width:100%;font-size:12px;font-family:'Inter',sans-serif;background:transparent;border:none;outline:none;color:var(--text);}
.add-inp::placeholder{color:var(--text-3);}
.add-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.add-sel{font-size:11px;font-family:'Inter',sans-serif;background:var(--surface);border:1px solid var(--border-md);border-radius:5px;color:var(--text-2);padding:2px 5px;cursor:pointer;}
.add-actions{display:flex;gap:4px;margin-left:auto;}
.btn-sm{font-size:11px;font-family:'Inter',sans-serif;font-weight:500;padding:3px 9px;border-radius:5px;border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--text-2);}
.btn-sm:hover{background:var(--bg);}
.btn-sm.ok{background:var(--text);color:#fff;border-color:var(--text);}
.add-trigger{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:5px;cursor:pointer;padding:6px 8px;border-radius:var(--r);border:1px dashed var(--border);transition:all 0.12s;}
.add-trigger:hover{color:var(--text-2);border-color:var(--border-md);background:var(--surface);}

/* SECTION HDR */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.section-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.btn-outline{font-size:12px;font-weight:500;font-family:'Inter',sans-serif;padding:6px 14px;border-radius:var(--r);border:1px solid var(--border-md);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all 0.15s;}
.btn-outline:hover{border-color:var(--text);color:var(--text);}

/* PROJETOS */
.projetos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.projeto-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color 0.15s;}
.projeto-card:hover{border-color:var(--border-md);}
.projeto-cor{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.projeto-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.projeto-nome{font-size:14px;font-weight:500;}
.projeto-desc{font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:10px;}
.projeto-footer{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em;}
.status-ativo{background:var(--green-bg);color:var(--green-txt);}
.status-pausado{background:var(--amber-bg);color:var(--amber);}
.status-concluido{background:var(--surface-2);color:var(--text-2);}
.projeto-prog{margin-top:10px;}
.prog-bar{height:4px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:999px;background:var(--done);transition:width 0.4s;}
.prog-label{font-size:10px;color:var(--text-3);}

/* PROJETO DETALHE */
.projeto-detalhe{display:none;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);cursor:pointer;margin-bottom:16px;background:none;border:none;font-family:'Inter',sans-serif;padding:0;}
.back-btn:hover{color:var(--text);}
.detalhe-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
.detalhe-title{font-size:18px;font-weight:600;letter-spacing:-0.4px;margin-bottom:4px;}
.detalhe-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.detalhe-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detalhe-col{display:flex;flex-direction:column;gap:12px;}

/* METAS */
.metas-list{display:flex;flex-direction:column;gap:8px;}
.meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.meta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.meta-nome{font-size:12px;font-weight:500;}
.meta-tipo{font-size:10px;color:var(--text-3);}
.meta-valor{font-size:18px;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
.meta-target{font-size:11px;color:var(--text-3);margin-top:1px;}

/* ATIVIDADES */
.ativ-list{display:flex;flex-direction:column;gap:6px;}
.ativ-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:border-color 0.12s;}
.ativ-card:hover{border-color:var(--border-md);}
.ativ-card.status-em_andamento{border-left:3px solid var(--purple);border-radius:0 var(--r) var(--r) 0;}
.ativ-card.status-concluido{border-left:3px solid var(--done);border-radius:0 var(--r) var(--r) 0;opacity:0.6;}
.ativ-card.status-atrasado{border-left:3px solid var(--red);border-radius:0 var(--r) var(--r) 0;}
.ativ-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.ativ-nome{font-size:12px;font-weight:500;flex:1;}
.ativ-footer{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.ativ-status{font-size:10px;font-weight:600;padding:1px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em;}
.as-pendente{background:var(--surface-2);color:var(--text-2);}
.as-em_andamento{background:var(--purple-bg);color:var(--purple-txt);}
.as-concluido{background:var(--green-bg);color:var(--green-txt);}
.as-atrasado{background:var(--red-bg);color:var(--red);}
.ativ-prazo{font-size:10px;color:var(--text-3);}
.dep-tag{font-size:10px;color:var(--amber);background:var(--amber-bg);padding:1px 6px;border-radius:999px;}

/* EQUIPE */
.equipe-list{display:flex;flex-direction:column;gap:6px;}
.membro-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:12px;}
.membro-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.membro-info{flex:1;}
.membro-nome{font-size:13px;font-weight:500;}
.membro-email{font-size:11px;color:var(--text-3);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:14px;padding:28px;width:100%;max-width:480px;margin:16px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;margin-bottom:20px;}
.modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color 0.15s;}
.color-opt.selected{border-color:var(--text);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{font-size:13px;font-family:'Inter',sans-serif;padding:8px 16px;border-radius:var(--r);border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--text-2);}
.btn-cancel:hover{background:var(--bg);}
.btn-save{font-size:13px;font-family:'Inter',sans-serif;font-weight:500;padding:8px 20px;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;}
.btn-save:hover{background:#333;}
.btn-save:disabled{background:var(--text-3);cursor:not-allowed;}
.modal-divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.mini-section{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.meta-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.meta-row input,.meta-row select{flex:1;padding:7px 10px;border-radius:var(--r);border:1px solid var(--border-md);font-size:12px;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
.meta-row input:focus,.meta-row select:focus{outline:none;border-color:var(--purple);}
.add-meta-btn{font-size:11px;color:var(--text-3);background:none;border:1px dashed var(--border-md);border-radius:var(--r);padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-top:4px;}
.add-meta-btn:hover{color:var(--text-2);}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:16px;padding:0 4px;flex-shrink:0;}
.remove-btn:hover{color:var(--red);}

/* NOTIFICACOES PANEL */
.notif-panel{position:fixed;top:60px;right:24px;width:320px;background:var(--surface);border:1px solid var(--border-md);border-radius:12px;z-index:300;padding:16px;max-height:400px;overflow-y:auto;display:none;}
.notif-panel.open{display:block;}
.notif-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.notif-item:last-child{border-bottom:none;}
.notif-titulo{font-size:12px;font-weight:500;color:var(--text);}
.notif-msg{font-size:11px;color:var(--text-2);}
.notif-time{font-size:10px;color:var(--text-3);}
.notif-empty{font-size:12px;color:var(--text-3);text-align:center;padding:20px 0;}

/* UTILS */
.loading{text-align:center;padding:60px 0;color:var(--text-3);}
.spinner{width:20px;height:20px;border:2px solid var(--border-md);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:9px 16px;border-radius:var(--r);opacity:0;transform:translateY(6px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.empty{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;}

@media(max-width:800px){.board{grid-template-columns:repeat(3,1fr);}main{padding:14px;}.header-inner{padding:10px 14px;}.detalhe-body{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-dots"><div class="logo-dot ld1"></div><div class="logo-dot ld2"></div></div>
      <div><div class="login-title">Planejador</div><div class="login-sub">Gestao de tarefas e projetos</div></div>
    </div>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Entrar</button>

// AUTH
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pass){showLoginError('Preencha email e senha.');return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const r=await fetch(SB+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const data=await r.json();
    if(data.error||!data.access_token){showLoginError(data.error_description||'Email ou senha incorretos.');btn.disabled=false;btn.textContent='Entrar';return;}
    accessToken=data.access_token;currentUser=data.user;
    localStorage.setItem('sb_token',accessToken);
    await loadProfile();initApp();
  }catch(e){showLoginError('Erro de conexao.');btn.disabled=false;btn.textContent='Entrar';}
}
function showLoginError(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
async function doLogout(){
  await fetch(SB+'/auth/v1/logout',{method:'POST',headers:h()});
  accessToken=null;currentUser=null;currentProfile=null;
  localStorage.removeItem('sb_token');
  showPage('page-login');
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent='Entrar';
  document.getElementById('login-error').style.display='none';
}
async function loadProfile(){
  const r=await fetch(SB+'/rest/v1/usuarios?id=eq.'+currentUser.id+'&select=*,grupos(nome)',{headers:h()});
  const data=await r.json();currentProfile=data[0]||null;
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// INIT

// EMPRESAS
async function loadEmpresas(){
  try{const r=await fetch(SB+'/rest/v1/empresas?ativo=eq.true&order=created_at.asc',{headers:h()});empresas=await r.json();if(!Array.isArray(empresas))empresas=[];}catch(e){empresas=[];}
  renderEmpresaBar();renderColorPicker('color-picker-emp');renderProjEmpSelect();renderUsrEmpSelect();
}
function renderEmpresaBar(){
  const bar=document.getElementById('empresa-bar');
  const addBtn=document.getElementById('emp-add-btn');
  bar.innerHTML='';
  const todas=document.createElement('button');
  todas.className='emp-filter todas'+(selectedEmpresa===null?' active':'');
  todas.textContent='Todas';todas.onclick=()=>filterEmpresa(null,todas);
  bar.appendChild(todas);
  empresas.forEach(emp=>{
    const btn=document.createElement('button');
    btn.className='emp-filter'+(selectedEmpresa===emp.id?' active':'');
    btn.innerHTML='<div class="emp-dot" style="background:'+emp.cor+'"></div>'+esc(emp.nome);
    btn.onclick=()=>filterEmpresa(emp.id,btn);
    bar.appendChild(btn);
  });
  bar.appendChild(addBtn);
  addBtn.style.display=['superadmin','admin'].includes(currentProfile.role)?'':'none';
}
function filterEmpresa(id){selectedEmpresa=id;renderEmpresaBar();renderBoard();}
function renderColorPicker(pickerId){
  selectedColor=COLORS[0];
  const picker=document.getElementById(pickerId);if(!picker)return;
  picker.innerHTML='';
  COLORS.forEach(c=>{
    const opt=document.createElement('div');
    opt.className='color-opt'+(c===selectedColor?' selected':'');
    opt.style.background=c;
    opt.onclick=()=>{selectedColor=c;renderColorPicker(pickerId);};
    picker.appendChild(opt);
  });
}
function renderProjEmpSelect(){
  const sel=document.getElementById('proj-empresa');if(!sel)return;
  sel.innerHTML='<option value="">Selecione a empresa</option>'+empresas.map(e=>'<option value="'+e.id+'">'+esc(e.nome)+'</option>').join('');
}
function renderUsrEmpSelect(){
  const sel=document.getElementById('usr-empresas');if(!sel)return;
  sel.innerHTML=empresas.map(e=>'<option value="'+e.id+'">'+esc(e.nome)+'</option>').join('');
}
async function saveEmpresa(){
  const nome=document.getElementById('emp-nome').value.trim();
  if(!nome){toast('Coloca um nome');return;}
  const btn=document.getElementById('btn-save-emp');btn.disabled=true;btn.textContent='Salvando...';
  try{
    const r=await fetch(SB+'/rest/v1/empresas',{method:'POST',headers:h(),body:JSON.stringify({grupo_id:currentProfile.grupo_id,nome,cor:selectedColor,ativo:true})});
    const data=await r.json();
    if(Array.isArray(data)&&data[0]){empresas.push(data[0]);renderEmpresaBar();renderProjEmpSelect();renderUsrEmpSelect();toast('Empresa criada!',true);closeModal('modal-empresa');}
    else toast('Erro ao criar empresa');
  }catch(e){toast('Erro ao salvar');}
  btn.disabled=false;btn.textContent='Criar empresa';

async function loadUsuarios(){
  try{const r=await fetch(SB+'/rest/v1/usuarios?order=created_at.asc',{headers:h()});usuarios=await r.json();if(!Array.isArray(usuarios))usuarios=[];}catch(e){usuarios=[];}

// WEEK
function getMonday(off){const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff+off*7);d.setHours(0,0,0,0);return d;}
function dk(d){return d.toISOString().slice(0,10);}
function weekDates(){const mon=getMonday(weekOffset);return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function moveWeek(dir){weekOffset+=dir;openForm=null;loadBoard();}

// BOARD
async function loadBoard(){
  document.getElementById('board-wrap').innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  const dates=weekDates();const from=dk(dates[0]),to=dk(dates[4]);
  try{
    const r=await fetch(SB+'/rest/v1/tarefas_execucao?data=gte.'+from+'&data=lte.'+to+'&order=created_at.asc&select=*,tarefas_template(titulo,empresa_id,projeto_id,empresas(nome,cor),projetos(nome))',{headers:h()});
    execucoes=await r.json();if(!Array.isArray(execucoes))execucoes=[];
  }catch(e){execucoes=[];}
  renderBoard();
}
function renderBoard(){
  const dates=weekDates();const todayStr=dk(new Date());
  const mon=dates[0],fri=dates[4];
  document.getElementById('week-label').textContent=mon.getDate()+' '+MONTHS[mon.getMonth()]+' - '+fri.getDate()+' '+MONTHS[fri.getMonth()]+' '+fri.getFullYear();
  const myId=currentUser.id;
  const role=currentProfile.role;
  const canSeeAll=['superadmin','admin','gestor'].includes(role);
  const canAdd=['superadmin','admin','gestor'].includes(role);
  let total=0,done=0;
  const board=document.createElement('div');board.className='board';
  dates.forEach((d,i)=>{
    const dateStr=dk(d);const isToday=dateStr===todayStr;const isPast=dateStr<todayStr;
    let dayExecs=execucoes.filter(e=>e.data===dateStr&&(canSeeAll||e.usuario_id===myId));
    if(selectedEmpresa)dayExecs=dayExecs.filter(e=>e.empresa_id===selectedEmpresa||(e.tarefas_template&&e.tarefas_template.empresa_id===selectedEmpresa));
    const col=document.createElement('div');col.className='col';
    const hdr=document.createElement('div');hdr.className='day-hdr '+(isToday?'is-today':'normal');
    hdr.innerHTML='<div class="day-name">'+DAYS[i]+'</div><div class="day-date">'+d.getDate()+'</div>';
    col.appendChild(hdr);
    dayExecs.forEach(ex=>{
      total++;if(ex.status==='concluido')done++;
      const isLate=isPast&&ex.status==='pendente';
      const tmpl=ex.tarefas_template||{};const empresa=tmpl.empresas||null;const proj=tmpl.projetos||null;
      const el=document.createElement('div');
      el.className='task'+(ex.status==='concluido'?' is-done':'')+(isLate?' is-late':'');
      const chkClass=ex.status==='concluido'?'on':(isLate?'late':'');
      const txtClass=ex.status==='concluido'?'done-txt':'';
      const titulo=esc(tmpl.titulo||'Tarefa');
      const empCor=empresa?empresa.cor:'var(--purple)';
      const empNome=empresa?esc(empresa.nome):'';
      const projNome=proj?esc(proj.nome):'';
      let metaHtml='';
      if(empNome)metaHtml+='<span class="badge" style="background:'+empCor+'22;color:'+empCor+'">'+empNome+'</span>';
      if(projNome)metaHtml+='<span class="badge badge-projeto">'+projNome+'</span>';
      if(isLate)metaHtml+='<span class="badge badge-late">atrasada</span>';
      el.innerHTML='<div class="chk '+chkClass+'"></div><div class="task-body"><div class="task-text '+txtClass+'">'+titulo+'</div>'+(metaHtml?'<div class="task-meta">'+metaHtml+'</div>':'')+'</div>';
      el.onclick=()=>toggleExec(ex.id,ex.status);
      col.appendChild(el);
    });
    if(canAdd){
      if(openForm===dateStr){
        const form=document.createElement('div');form.className='add-form';
        const empOpts=empresas.map(e=>'<option value="'+e.id+'">'+esc(e.nome)+'</option>').join('');
        const projOpts=projetos.map(p=>'<option value="'+p.id+'">'+esc(p.nome)+'</option>').join('');
        form.innerHTML='<input class="add-inp" id="inp-'+dateStr+'" placeholder="Titulo da tarefa..." autocomplete="off">'+
          '<div class="add-row">'+
            '<select class="add-sel" id="sel-emp-'+dateStr+'"><option value="">Sem empresa</option>'+empOpts+'</select>'+
            '<select class="add-sel" id="sel-proj-'+dateStr+'"><option value="">Sem projeto</option>'+projOpts+'</select>'+
            '<div class="add-actions"><button class="btn-sm" onclick="cancelForm()">Cancelar</button><button class="btn-sm ok" onclick="addExec(\''+dateStr+'\')">Adicionar</button></div>'+
          '</div>';
        col.appendChild(form);
        setTimeout(()=>{const el=document.getElementById('inp-'+dateStr);if(el)el.focus();},30);
        if(selectedEmpresa)setTimeout(()=>{const s=document.getElementById('sel-emp-'+dateStr);if(s)s.value=selectedEmpresa;},40);
      }else{
        const trig=document.createElement('div');trig.className='add-trigger';
        trig.innerHTML='<span style="font-size:16px;line-height:1">+</span> adicionar tarefa';
        trig.onclick=()=>{openForm=dateStr;renderBoard();};
        col.appendChild(trig);
      }
    }
    board.appendChild(col);
  });
  document.getElementById('board-wrap').innerHTML='';
  document.getElementById('board-wrap').appendChild(board);
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('chip-total').textContent=total+' tarefa'+(total!==1?'s':'');
  document.getElementById('chip-done').textContent=pct+'% concluido';
  document.getElementById('chip-done').className='chip'+(pct>0?' ok':'');
  document.getElementById('prog-fill').style.width=pct+'%';
}
async function toggleExec(id,status){
  const next=status==='concluido'?'pendente':'concluido';
  await fetch(SB+'/rest/v1/tarefas_execucao?id=eq.'+id,{method:'PATCH',headers:h(),body:JSON.stringify({status:next})});
  const ex=execucoes.find(e=>e.id===id);if(ex)ex.status=next;
  renderBoard();toast(next==='concluido'?'Concluida!':'Reaberta',next==='concluido');
}
async function addExec(dateStr){
  const inp=document.getElementById('inp-'+dateStr);
  const selEmp=document.getElementById('sel-emp-'+dateStr);
  const selProj=document.getElementById('sel-proj-'+dateStr);
  if(!inp||!inp.value.trim())return;
  const empresaId=selEmp.value||null,projetoId=selProj.value||null;
  try{
    const tmplBody={grupo_id:currentProfile.grupo_id,empresa_id:empresaId,projeto_id:projetoId,criado_por:currentUser.id,titulo:inp.value.trim(),tipo:'pontual',data_pontual:dateStr,ativo:true};
    const tr=await fetch(SB+'/rest/v1/tarefas_template',{method:'POST',headers:h(),body:JSON.stringify(tmplBody)});
    const tmplData=await tr.json();const tmpl=Array.isArray(tmplData)?tmplData[0]:tmplData;
    if(!tmpl||!tmpl.id){toast('Erro ao criar tarefa');return;}
    const execBody={template_id:tmpl.id,projeto_id:projetoId,usuario_id:currentUser.id,empresa_id:empresaId,grupo_id:currentProfile.grupo_id,data:dateStr,status:'pendente'};
    const er=await fetch(SB+'/rest/v1/tarefas_execucao',{method:'POST',headers:h(),body:JSON.stringify(execBody)});
    const execData=await er.json();const exec=Array.isArray(execData)?execData[0]:execData;
    if(exec&&exec.id){
      const emp=empresas.find(e=>e.id===empresaId);const proj=projetos.find(p=>p.id===projetoId);
      exec.tarefas_template={titulo:tmpl.titulo,empresa_id:empresaId,projeto_id:projetoId,empresas:emp||null,projetos:proj||null};
      execucoes.push(exec);
    }
    toast('Tarefa adicionada',true);
  }catch(e){toast('Erro ao salvar');}
  openForm=null;renderBoard();
}
function cancelForm(){openForm=null;renderBoard();}

// PROJETOS
async function loadProjetos(){
  document.getElementById('projetos-wrap').innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  try{
    const r=await fetch(SB+'/rest/v1/projetos?order=created_at.desc&select=*,empresas(nome,cor)',{headers:h()});
    projetos=await r.json();if(!Array.isArray(projetos))projetos=[];
  }catch(e){projetos=[];}
  renderProjetos();
}
function renderProjetos(){
  const wrap=document.getElementById('projetos-wrap');
  if(!projetos.length){wrap.innerHTML='<div class="empty">Nenhum projeto ainda.</div>';return;}
  const grid=document.createElement('div');grid.className='projetos-grid';
  projetos.forEach(p=>{
    const card=document.createElement('div');card.className='projeto-card';
    const emp=p.empresas||null;
    const empCor=emp?emp.cor:'var(--purple)';
    const empNome=emp?esc(emp.nome):'';
    card.innerHTML='<div class="projeto-header"><div class="projeto-cor" style="background:'+(p.cor||'var(--purple)')+'"></div><span class="projeto-nome">'+esc(p.nome)+'</span></div>'+
      (p.descricao?'<div class="projeto-desc">'+esc(p.descricao)+'</div>':'')+
      '<div class="projeto-footer"><span class="status-badge status-'+(p.status||'ativo')+'">'+(p.status||'ativo')+'</span>'+(empNome?'<span class="badge" style="background:'+empCor+'22;color:'+empCor+'">'+empNome+'</span>':'')+'</div>'+
      '<div class="projeto-prog"><span class="prog-label">Atividades</span><div class="prog-bar"><div class="prog-fill" style="width:0%" id="prog-'+p.id+'"></div></div></div>';
    card.onclick=()=>openProjeto(p.id);
    grid.appendChild(card);
  });
  wrap.innerHTML='';wrap.appendChild(grid);
  projetos.forEach(p=>loadProjetoProgress(p.id));
}
async function loadProjetoProgress(projetoId){
  try{
    const r=await fetch(SB+'/rest/v1/atividades?projeto_id=eq.'+projetoId+'&select=status',{headers:h()});
    const ativs=await r.json();
    if(!Array.isArray(ativs)||!ativs.length)return;
    const done=ativs.filter(a=>a.status==='concluido').length;
    const pct=Math.round((done/ativs.length)*100);
    const el=document.getElementById('prog-'+projetoId);
    if(el){el.style.width=pct+'%';el.closest('.projeto-prog').querySelector('.prog-label').textContent=done+'/'+ativs.length+' atividades';}
  }catch(e){}
}

function addMetaRow(){

async function saveProjeto(){
  const nome=document.getElementById('proj-nome').value.trim();
  const desc=document.getElementById('proj-desc').value.trim();
  const empresaId=document.getElementById('proj-empresa').value;
  const status=document.getElementById('proj-status').value;
  const inicio=document.getElementById('proj-inicio').value||null;
  const fim=document.getElementById('proj-fim').value||null;
  if(!nome||!empresaId){toast('Preencha nome e empresa');return;}
  const btn=document.getElementById('btn-save-proj');btn.disabled=true;btn.textContent='Salvando...';
  try{
    const body={grupo_id:currentProfile.grupo_id,empresa_id:empresaId,nome,descricao:desc||null,cor:selectedColor,status,data_inicio:inicio,data_fim:fim,criado_por:currentUser.id};
    const r=await fetch(SB+'/rest/v1/projetos',{method:'POST',headers:h(),body:JSON.stringify(body)});
    const data=await r.json();const proj=Array.isArray(data)?data[0]:data;
    if(!proj||!proj.id){toast('Erro ao criar projeto');btn.disabled=false;btn.textContent='Criar projeto';return;}
    const metaEls=document.querySelectorAll('#metas-form .meta-row');
    for(const row of metaEls){
      const inputs=row.querySelectorAll('input,select');
      const mNome=inputs[0].value.trim();const mTipo=inputs[1].value;const mValor=parseFloat(inputs[2].value)||0;
      if(mNome&&mValor>0){
        await fetch(SB+'/rest/v1/metas',{method:'POST',headers:h(),body:JSON.stringify({projeto_id:proj.id,grupo_id:currentProfile.grupo_id,nome:mNome,tipo:mTipo,valor_meta:mValor,valor_atual:0})});
      }
    }
    projetos.unshift({...proj,empresas:empresas.find(e=>e.id===empresaId)||null});
    renderProjetos();
    toast('Projeto criado!',true);closeModal('modal-projeto');
    document.getElementById('proj-nome').value='';document.getElementById('proj-desc').value='';
    document.getElementById('metas-form').innerHTML='';metaRows=0;
  }catch(e){toast('Erro: '+e.message);}
  btn.disabled=false;btn.textContent='Criar projeto';
}

function renderMetasHTML(metas){
  if(!metas.length)return'<div class="empty" style="padding:20px 0">Nenhuma meta cadastrada.</div>';
  return metas.map(m=>{
    const pct=m.valor_meta>0?Math.min(100,Math.round((m.valor_atual/m.valor_meta)*100)):0;
    let valor='';
    if(m.tipo==='moeda')valor='R$ '+Number(m.valor_atual).toLocaleString('pt-BR');
    else if(m.tipo==='tempo')valor=m.valor_atual+'h';
    else if(m.tipo==='percentual')valor=m.valor_atual+'%';
    else valor=String(m.valor_atual);
    let meta='';
    if(m.tipo==='moeda')meta='R$ '+Number(m.valor_meta).toLocaleString('pt-BR');
    else if(m.tipo==='tempo')meta=m.valor_meta+'h';
    else if(m.tipo==='percentual')meta=m.valor_meta+'%';
    else meta=String(m.valor_meta);
    return'<div class="meta-card"><div class="meta-header"><span class="meta-nome">'+esc(m.nome)+'</span><span class="meta-tipo">'+m.tipo+'</span></div><div class="meta-valor">'+valor+'</div><div class="meta-target">Meta: '+meta+'</div><div class="prog-bar" style="margin-top:8px"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  }).join('');
}

function renderAtivsHTML(ativs,allAtivs){
  if(!ativs.length)return'<div class="empty" style="padding:20px 0">Nenhuma atividade ainda.</div>';
  return ativs.map(a=>{
    const resp=a.usuarios?esc(a.usuarios.nome):'';
    const depAtiv=a.tipo_prazo==='dependencia';
    return'<div class="ativ-card status-'+a.status+'" onclick="toggleAtivStatus(\''+a.id+'\',\''+a.status+'\')">'+
      '<div class="ativ-header"><span class="ativ-nome">'+esc(a.nome)+'</span><span class="ativ-status as-'+a.status+'">'+a.status.replace('_',' ')+'</span></div>'+
      '<div class="ativ-footer">'+
        (resp?'<span style="font-size:10px;color:var(--text-2)">'+resp+'</span>':'')+
        (a.data_prazo&&!depAtiv?'<span class="ativ-prazo">'+a.data_prazo+'</span>':'')+
        (depAtiv?'<span class="dep-tag">aguarda dependencia</span>':'')+
      '</div>'+
    '</div>';
  }).join('');
}

async function toggleAtivStatus(id,status){

}

async function saveAtividade(){
  const nome=document.getElementById('ativ-nome').value.trim();
  const pq=document.getElementById('ativ-pq').value.trim();
  const como=document.getElementById('ativ-como').value.trim();
  const resp=document.getElementById('ativ-resp').value||null;
  const tipoPrazo=document.getElementById('ativ-tipo-prazo').value;
  const data=document.getElementById('ativ-data').value||null;

}
